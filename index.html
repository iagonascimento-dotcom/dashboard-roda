function KPICard({ label, value, sub, icon, color }) {
  return (
    <div style={{
      background:"#111318",borderRadius:16,padding:"22px 20px",
      border:"1px solid #1c2030",position:"relative",overflow:"hidden",
    }}>
      <div style={{position:"absolute",top:0,left:0,right:0,height:3,background:color}}/>
      <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:8}}>
        <span style={{fontSize:15,opacity:0.8}}>{icon}</span>
        <span style={{fontSize:11.5,color:"#7a8299",fontWeight:500,letterSpacing:"0.3px",textTransform:"uppercase"}}>{label}</span>
      </div>
      <div style={{fontSize:30,fontWeight:800,color:"#eceff4",fontFamily:"'Space Mono',monospace",letterSpacing:"-1px"}}>{value}</div>
      {sub && <div style={{fontSize:11,color:"#5c6578",marginTop:5}}>{sub}</div>}
    </div>
  );
}

function HeatRow({ data }) {
  const hours = Array.from({length:24},(_,i)=>i);
  const vals = hours.map(h=>data[h]||0);
  const mx = Math.max(...vals);
  return (
    <div style={{display:"grid",gridTemplateColumns:"repeat(24,1fr)",gap:3}}>
      {hours.map(h => {
        const v = data[h]||0;
        const t = mx>0?v/mx:0;
        return (
          <div key={h} title={`${String(h).padStart(2,"0")}h — ${v} abordagens`} style={{
            aspectRatio:"1",borderRadius:5,
            background:`rgba(245,158,11,${0.06+t*0.88})`,
            display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
            cursor:"default",
          }}>
            <span style={{fontSize:7,color:t>0.45?"#fff":"#5c6578",fontWeight:600,lineHeight:1}}>{String(h).padStart(2,"0")}</span>
            <span style={{fontSize:8.5,color:t>0.45?"#fff":"#b0b8cc",fontWeight:700,lineHeight:1.3}}>{v}</span>
          </div>
        );
      })}
    </div>
  );
}

function BarRank({ data, maxItems, sortKey, showDuration }) {
  const sorted = [...data].sort((a,b)=>b[sortKey]-a[sortKey]).slice(0,maxItems);
  const mx = Math.max(...sorted.map(d=>d[sortKey]));
  return (
    <div style={{display:"flex",flexDirection:"column",gap:4}}>
      {sorted.map((d,i) => {
        const pct = mx>0?(d[sortKey]/mx)*100:0;
        const top = i<3;
        return (
          <div key={d.name} style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{
              minWidth:20,height:20,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",
              fontSize:9,fontWeight:700,background:top?"#f59e0b":"#1c2030",color:top?"#111":"#5c6578",
            }}>{i+1}</span>
            <span style={{
              width:150,fontSize:11,color:"#dce1ec",fontWeight:top?600:400,
              overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",
            }} title={d.name}>{d.name}</span>
            <div style={{flex:1,height:22,background:"#0c0e14",borderRadius:5,overflow:"hidden",position:"relative"}}>
              <div style={{
                height:"100%",width:`${pct}%`,borderRadius:5,
                background:top?"linear-gradient(90deg,#f59e0b,#ef6c00)":"rgba(245,158,11,0.25)",
                transition:"width .5s cubic-bezier(.22,.68,0,1)",
              }}/>
              <div style={{
                position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",
                fontSize:10,fontWeight:700,color:"#eceff4",fontFamily:"'Space Mono',monospace",
                display:"flex",gap:8,
              }}>
                <span>{d.sessions}</span>
                {showDuration && <span style={{color:"#5c6578",fontWeight:400}}>{fmtSec(d.avgDur)}</span>}
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function DailyBars({ data, range }) {
  const entries = Object.entries(data).sort((a,b)=>a[0].localeCompare(b[0]));
  const filtered = range==="7d"?entries.slice(-7):range==="14d"?entries.slice(-14):range==="30d"?entries.slice(-30):entries;
  const mx = Math.max(...filtered.map(([,v])=>v));
  const avg = filtered.reduce((s,[,v])=>s+v,0)/filtered.length;
  const bw = Math.max(5,Math.min(16,(580/filtered.length)-2));
  const W = filtered.length*(bw+2)+40;
  return (
    <div style={{overflowX:"auto",paddingBottom:4}}>
      <svg width={W} height={130} style={{display:"block"}}>
        {(()=>{const y=118-(mx>0?(avg/mx)*105:0);return(
          <g><line x1={0} x2={W} y1={y} y2={y} stroke="#f59e0b" strokeDasharray="3 3" strokeWidth={1} opacity={.5}/>
          <text x={W-4} y={y-4} textAnchor="end" style={{fontSize:8,fill:"#f59e0b",fontWeight:600}}>avg {Math.round(avg)}</text></g>
        );})()}
        {filtered.map(([date,val],i) => {
          const h = mx>0?(val/mx)*105:0;
          const x = i*(bw+2);
          const wd = new Date(date).getDay();
          const weekend = wd===0||wd===6;
          return (
            <g key={date}>
              <title>{date}: {val}</title>
              <rect x={x} y={118-h} width={bw} height={h} rx={2.5}
                fill={weekend?"rgba(245,158,11,0.25)":"#f59e0b"} opacity={.85}/>
              {filtered.length<=20 && <text x={x+bw/2} y={128} textAnchor="middle" style={{fontSize:6.5,fill:"#5c6578"}}>{date.slice(5)}</text>}
            </g>
          );
        })}
      </svg>
    </div>
  );
}

function WeeklyCards({ data }) {
  const mx = Math.max(...data.map(d=>d.sessions));
  return (
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:8}}>
      {data.map((w,i) => {
        const pct = (w.sessions/mx)*100;
        return (
          <div key={i} style={{background:"#0c0e14",borderRadius:10,padding:"12px 14px",border:"1px solid #1c2030"}}>
            <div style={{fontSize:10,color:"#5c6578",marginBottom:6}}>{w.week}</div>
            <div style={{fontSize:20,fontWeight:800,fontFamily:"'Space Mono',monospace",color:"#eceff4"}}>{w.sessions}</div>
            <div style={{height:4,background:"#1c2030",borderRadius:2,marginTop:8,overflow:"hidden"}}>
              <div style={{height:"100%",width:`${pct}%`,background:"#f59e0b",borderRadius:2}}/>
            </div>
            <div style={{fontSize:9,color:"#5c6578",marginTop:6}}>média {fmtSec(w.avgDur)}/sessão</div>
          </div>
        );
      })}
    </div>
  );
}

            <BarRank data={PDV_DATA} maxItems={10} sortKey="sessions" showDuration={true}/>
          </div>
        </div>
      </>}

      {/* ═══ TAB PDVs ═══ */}
      {tab==="pdvs" && (
        <div style={{background:S.card,border:`1px solid ${S.border}`,borderRadius:14,padding:"20px 22px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10,marginBottom:18}}>
            <span style={{fontSize:15,fontWeight:700}}>Ranking Completo — {filteredPDV.length} PDVs</span>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <input type="text" placeholder="Buscar PDV..." value={search} onChange={e=>setSearch(e.target.value)} style={{
                background:S.bg,border:`1px solid ${S.border}`,borderRadius:8,padding:"6px 12px",
                color:S.fg,fontSize:12,fontFamily:"inherit",width:180,
              }}/>
              <div style={{display:"flex",gap:3}}>
                {[["sessions","Volume"],["avgDur","Duração"]].map(([k,l])=>(
                  <button key={k} onClick={()=>setPdvSort(k)} style={{
                    padding:"5px 12px",borderRadius:6,border:`1px solid ${S.border}`,
                    background:pdvSort===k?"#f59e0b":"transparent",color:pdvSort===k?"#111":S.muted,
                    fontSize:11,fontWeight:600,fontFamily:"inherit",
                  }}>{l}</button>
                ))}
              </div>
            </div>
          </div>
          <BarRank data={filteredPDV} maxItems={40} sortKey={pdvSort} showDuration={true}/>
          <div style={{marginTop:18,padding:"14px 16px",background:S.bg,borderRadius:10,fontSize:11,color:S.muted,lineHeight:1.7}}>
            <b style={{color:"#f59e0b"}}>💡 Insights:</b> MC DOCE LAR CONQUISTA lidera em volume (285) e duração média (78s), indicando alta demanda de intervenção.
            MC DELOS possui maior duração média entre PDVs expressivos (93s — possível ponto crítico).
            PDVs com duração curta e alto volume (CARIOCA BL.2 — 32s, QAURTIER CATETE — 25s) indicam abordagens preventivas rápidas.
          </div>
        </div>
      )}

      {/* ═══ TAB TEMPO ═══ */}
      {tab==="tempo" && (<div>
        <div style={{background:S.card,border:`1px solid ${S.border}`,borderRadius:14,padding:"18px 20px",marginBottom:16}}>
          <span style={{fontSize:13,fontWeight:700,display:"block",marginBottom:12}}>Abordagens Diárias — Período Completo</span>
          <DailyBars data={DAILY_DATA} range="all"/>
          <div style={{marginTop:10,fontSize:10,color:S.muted}}>
            📌 Picos: <b style={{color:S.fg}}>07/Mai (222)</b> · <b style={{color:S.fg}}>29/Abr (213)</b> · <b style={{color:S.fg}}>05/Mai (171)</b> · Fins de semana em barras mais claras
          </div>
        </div>
        <div style={{background:S.card,border:`1px solid ${S.border}`,borderRadius:14,padding:"18px 20px",marginBottom:16}}>
          <span style={{fontSize:13,fontWeight:700,display:"block",marginBottom:12}}>Tendência Semanal</span>
          <WeeklyCards data={WEEKLY_DATA}/>
          <div style={{marginTop:12,fontSize:10,color:S.muted}}>
            📈 Crescimento de <b style={{color:"#22c55e"}}>+42%</b> entre semanas 14 e 19 (amadurecimento da operação)
          </div>
        </div>
        <div style={{background:S.card,border:`1px solid ${S.border}`,borderRadius:14,padding:"18px 20px"}}>
          <span style={{fontSize:13,fontWeight:700,display:"block",marginBottom:14}}>Hoje — 19/Mai · {TODAY_SESSIONS.length} abordagens</span>
          <div style={{display:"flex",flexDirection:"column",gap:3}}>
            {[...TODAY_SESSIONS].sort((a,b)=>b.h===a.h?b.m-a.m:b.h-a.h).map((s,i)=>(
              <div key={i} style={{
                display:"flex",alignItems:"center",gap:10,padding:"7px 12px",
                background:i%2===0?"#0c0e14":"transparent",borderRadius:7,fontSize:12,
              }}>
                <span style={{fontFamily:"'Space Mono',monospace",color:"#f59e0b",fontWeight:700,width:48,fontSize:11}}>
                  {String(s.h).padStart(2,"0")}:{String(s.m).padStart(2,"0")}
                </span>
                <span style={{flex:1,fontWeight:500}}>{s.r}</span>
                <span style={{color:S.muted,fontSize:10,maxWidth:160,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.a}</span>
                <span style={{
                  fontFamily:"'Space Mono',monospace",fontWeight:700,fontSize:10.5,
                  color:s.dur>60?"#fbbf24":"#22c55e",
                  background:s.dur>60?"rgba(251,191,36,0.1)":"rgba(34,197,94,0.1)",
                  padding:"2px 8px",borderRadius:4,minWidth:42,textAlign:"center",
                }}>{fmtSec(s.dur)}</span>
              </div>
            ))}
          </div>
        </div>
      </div>)}

      {/* ═══ TAB HEATMAP ═══ */}
      {tab==="heat" && (<div>
        <div style={{background:S.card,border:`1px solid ${S.border}`,borderRadius:14,padding:"22px 22px",marginBottom:16}}>
          <span style={{fontSize:15,fontWeight:700,display:"block",marginBottom:16}}>Mapa de Calor — Volume por Hora</span>
          <HeatRow data={HOURLY_DATA}/>
          <div style={{marginTop:20,display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:10}}>
            {[
              {label:"Madrugada (00–06h)",range:[0,1,2,3,4,5],color:"#6366f1"},
              {label:"Manhã (07–12h)",range:[7,8,9,10,11,12],color:"#f59e0b"},
              {label:"Tarde (13–18h)",range:[13,14,15,16,17,18],color:"#ef6c00"},
              {label:"Noite (19–23h)",range:[19,20,21,22,23],color:"#8b5cf6"},
            ].map(p=>{
              const tot = p.range.reduce((s,h)=>s+(HOURLY_DATA[h]||0),0);
              return (
                <div key={p.label} style={{background:S.bg,borderRadius:10,padding:"14px 16px",borderLeft:`3px solid ${p.color}`}}>
                  <div style={{fontSize:10,color:S.muted,marginBottom:4}}>{p.label}</div>
                  <div style={{fontSize:24,fontWeight:800,fontFamily:"'Space Mono',monospace"}}>{tot}</div>
                  <div style={{fontSize:10,color:S.muted}}>{((tot/TOTAL_SESSIONS)*100).toFixed(1)}% do total</div>
                </div>
              );
            })}
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
          <div style={{background:S.card,border:`1px solid ${S.border}`,borderRadius:14,padding:"18px 20px"}}>
            <span style={{fontSize:13,fontWeight:700,display:"block",marginBottom:12}}>Top 10 — Maior Duração Média</span>
            <BarRank data={PDV_DATA} maxItems={10} sortKey="avgDur" showDuration={false}/>
          </div>
          <div style={{background:S.card,border:`1px solid ${S.border}`,borderRadius:14,padding:"18px 20px"}}>
            <span style={{fontSize:13,fontWeight:700,display:"block",marginBottom:14}}>Perfil das Abordagens</span>
            {[
              {label:"Rápidas < 30s",pct:52,desc:"Verificações e preventivas",color:"#22c55e"},
              {label:"Padrão 30s – 2min",pct:35,desc:"Interações de rotina",color:"#f59e0b"},
              {label:"Longas > 2min",pct:13,desc:"Incidentes ou acompanhamento",color:"#ef4444"},
            ].map(it=>(
              <div key={it.label} style={{background:S.bg,borderRadius:10,padding:"12px 14px",marginBottom:8}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                  <span style={{fontSize:12,fontWeight:500}}>{it.label}</span>
                  <span style={{fontFamily:"'Space Mono',monospace",fontWeight:800,fontSize:18,color:it.color}}>{it.pct}%</span>
                </div>
                <div style={{height:5,background:"#1c2030",borderRadius:3,overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${it.pct}%`,background:it.color,borderRadius:3}}/>
                </div>
                <div style={{fontSize:9.5,color:S.muted,marginTop:5}}>{it.desc}</div>
              </div>
            ))}
          </div>
        </div>
      </div>)}

      {/* ── FOOTER ── */}
      <div style={{marginTop:28,paddingTop:14,borderTop:`1px solid ${S.border}`,display:"flex",justifyContent:"space-between",fontSize:9.5,color:S.muted,flexWrap:"wrap",gap:8}}>
        <span>Roda Conveniência · Central de Monitoramento · HikCentral Professional</span>
        <span>Service_Log exportado 19/05/2026 10:45 · {fmt(8035)} registros processados</span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Dashboard/>);
</script>
</body>
</html>
